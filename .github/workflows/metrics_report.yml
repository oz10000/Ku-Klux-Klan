name: Reconstruir métricas (manual)

on:
  workflow_dispatch:
    inputs:
      hours:
        description: 'Horas hacia atrás a analizar'
        required: true
        default: '5'

jobs:
  generate-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar requests
        run: pip install requests

      - name: Ejecutar reconstructor
        env:
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_SECRET_KEY: ${{ secrets.OKX_SECRET_KEY }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
          OKX_DEMO: ${{ secrets.OKX_DEMO || '1' }}
          HOURS: ${{ github.event.inputs.hours }}
        run: python okx_metrics_reconstructor.py

      - name: Guardar reporte
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: metrics-report-${{ github.run_id }}
          path: |
            metrics/
            state/
          retention-days: 30
