name: OKX Certifier 24/7

on:
  schedule:
    - cron: "0 */5 * * *"        # Cada 5 horas, igual que el bot principal
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de certificación (FULL_CERTIFICATION o CONTINUOUS)'
        required: true
        default: 'CONTINUOUS'

concurrency:
  group: okx-certifier
  cancel-in-progress: false

permissions:
  contents: read                 # Solo lectura, no modifica el repositorio

jobs:
  certify:
    runs-on: ubuntu-latest
    timeout-minutes: 360         # Hasta 6 horas de ejecución (como el bot)

    steps:
      - name: ⬇️ Checkout del código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install requests numpy pandas python-dotenv

      - name: 🤖 Ejecutar Certificador OKX
        run: python tools/okx_certifier/okx_certifier.py
        env:
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_SECRET_KEY: ${{ secrets.OKX_SECRET_KEY }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
          OKX_DEMO: ${{ secrets.OKX_DEMO || '1' }}
          CERTIFIER_MODE: ${{ github.event.inputs.mode || 'CONTINUOUS' }}

      - name: 📊 Subir reporte de certificación
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: okx-certification-report-${{ github.run_id }}
          path: tools/okx_certifier/okx_certification_report.log
          retention-days: 30
